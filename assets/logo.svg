<svg viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Teematilat Oy">
  <defs>
    <linearGradient id="grey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7dde5"/>
      <stop offset="100%" stop-color="#8994a3"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2f66"/>
      <stop offset="100%" stop-color="#061f3d"/>
    </linearGradient>
  </defs>

  <g transform="translate(22 8)">

    <!-- top closer to bottom -->
    <polygon points="36,0 72,20 64,24 36,12 8,24 0,20"
             fill="url(#blue)" />

    <!-- left -->
    <polygon points="0,24 36,44 36,82 0,62"
             fill="url(#grey)" />

    <!-- right -->
    <polygon points="36,44 72,24 72,62 36,82"
             fill="url(#blue)" />

    <!-- left white cut -->
    <polygon points="10,52 20,57 20,75 10,70"
             fill="#ffffff" />

    <!-- right white cut -->
    <polygon points="52,57 62,52 62,70 52,75"
             fill="#ffffff" />

  </g>

  <text x="108" y="66"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="900"
        letter-spacing="-1.4"
        fill="#061f3d">
    Teematilat Oy
  </text>
</svg>